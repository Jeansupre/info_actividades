objetivos:
  descripcion: Durante el período reportado se habilitó la actualización autónoma de la información personal en la 
    Hoja de Vida para empleados y profesores de cátedra, incluyendo variables socioeconómicas y demográficas. 
    Esta mejora reduce la dependencia de procesos administrativos manuales y agiliza la disponibilidad de información actualizada 
    para la toma de decisiones institucionales. Adicionalmente, se fortaleció la calidad y confiabilidad de los datos mediante 
    validaciones según su estado y controles de acceso por rol, garantizando integridad en la edición. La solución incorpora 
    una experiencia de usuario clara, con lenguaje incluyente y capacidades como gestión de imagen de perfil, mejorando la 
    usabilidad y trazabilidad del sistema.
