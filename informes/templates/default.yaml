gestion:
  soportes_incidentes:
    descripcion: Durante el período se atendieron incidencias menores relacionadas con validaciones de formularios y 
      consistencia en la visualización de datos en la Hoja de Vida. Estas fueron clasificadas como de baja a media 
      criticidad y se resolvieron oportunamente sin afectar la operación de los usuarios finales. 
      Asimismo, se brindó acompañamiento funcional para la correcta interpretación de los nuevos 
      flujos de actualización de información.
  deuda_refactorizacion:
    descripcion: Se realizaron ajustes internos orientados a mejorar la mantenibilidad del código, especialmente en la 
      gestión de validaciones y control de estados de edición. Adicionalmente, se estandarizaron componentes 
      reutilizables para formularios y manejo de roles, facilitando su extensión en futuros desarrollos y reduciendo la 
      duplicidad de lógica.
  bloqueos:
    descripcion: Se presentaron bloqueos asociados a la definición de reglas de negocio para la edición de información 
      según su estado de validación, los cuales fueron resueltos mediante validaciones conjuntas con el equipo funcional. 
      No se registran bloqueos técnicos persistentes que hayan impactado significativamente la entrega de valor del sprint.
participacion_ceremonias:
  descripcion: Durante el periodo reportado, participé activamente en las ceremonias de la metodología Scrum del equipo, 
    incluyendo reuniones diarias (Daily), reunión semanal de avances (Weekly), planificación (Sprint Planning), 
    retrospectiva (Retrospective) y, cuando fue requerido, revisión (Review) y refinamiento de backlog.
    En estos espacios se realizó seguimiento al avance de las actividades, identificación de bloqueos, definición y 
    priorización de historias de usuario, y mejora continua del proceso. Adicionalmente, mantuve actualizada la información 
    de las tareas en la herramienta de gestión institucional (Taiga) y apoyé la elaboración de la documentación necesaria 
    durante el desarrollo del sprint. Esta participación permitió mantener la alineación del equipo y asegurar el cumplimiento 
    de las actividades asignadas. 
