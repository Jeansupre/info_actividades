<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../assets/informe.css">
    <title>Informe</title>
</head>
<body>
    <div class="header">
        <table>
            <thead>
                <tr>
                    <th colspan="3">
                        <div class="titulo">
                            <span style="font-weight:bold; font-size:16px;">INFORME DE ACTIVIDADES</span><br><span style="font-weight:bold; font-size:11px;">DIVISIÓN DE TECNOLOGÍAS DE LA INFORMACIÓN Y LA COMUNICACIÓN - DTIC</span>
                        </div>
                    </th>
                </tr>
            </thead>
            <tbody>
                <tr>
                    <td rowspan="4">
                        <div class="logo">
                            <img src="../assets/logo_uis.png" alt="logo uis" width="150" height="72.5"></td>
                        </div>
                    <td class="subcelda-w150">Informe No.</td>
                    <td class="subcelda-w250">{{encabezado.numero_informe}}</td>
                </tr>
                <tr>
                    <td class="subcelda-w150">Contrato No.</td>
                    <td class="subcelda-w250">{{encabezado.contrato_no}}</td>
                </tr>
                <tr>
                    <td class="subcelda-w150">Contratista:</td>
                    <td class="subcelda-w250">{{encabezado.contratista}}</td>
                </tr>
                <tr>
                    <td class="subcelda-w150">Período:</td>
                    <td class="subcelda-w250">{{ encabezado.inicio_periodo }} al {{ encabezado.fin_periodo }}</td>
                </tr>
            </tbody>
        </table>
    </div>
</body>
</html>
